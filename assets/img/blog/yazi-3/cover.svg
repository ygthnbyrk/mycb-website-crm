<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A1A1A"/>
      <stop offset="100%" stop-color="#0F0F0F"/>
    </linearGradient>
    <radialGradient id="glow3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#C13535" stop-opacity="0.22"/>
      <stop offset="70%" stop-color="#C13535" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid3" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#C13535" stroke-width="0.5" opacity="0.08"/>
    </pattern>
  </defs>
  
  <rect width="1200" height="630" fill="url(#bg3)"/>
  <rect width="1200" height="630" fill="url(#grid3)"/>
  <ellipse cx="600" cy="315" rx="420" ry="260" fill="url(#glow3)"/>
  
  <!-- Factory silhouette (background, very subtle) -->
  <g fill="#FFFFFF" opacity="0.04">
    <rect x="200" y="380" width="80" height="170"/>
    <rect x="280" y="340" width="120" height="210"/>
    <polygon points="280,340 320,310 360,340"/>
    <polygon points="320,340 360,310 400,340"/>
    <rect x="400" y="360" width="100" height="190"/>
    <rect x="700" y="370" width="100" height="180"/>
    <rect x="800" y="340" width="120" height="210"/>
    <polygon points="800,340 840,310 880,340"/>
    <polygon points="840,340 880,310 920,340"/>
    <rect x="920" y="380" width="80" height="170"/>
    <!-- chimneys -->
    <rect x="320" y="260" width="20" height="50"/>
    <rect x="360" y="270" width="18" height="40"/>
    <rect x="840" y="260" width="20" height="50"/>
    <rect x="880" y="270" width="18" height="40"/>
  </g>
  
  <!-- Connection lines between nodes -->
  <g stroke="#C13535" stroke-width="1.2" fill="none" opacity="0.35">
    <line x1="600" y1="280" x2="380" y2="180"/>
    <line x1="600" y1="280" x2="820" y2="180"/>
    <line x1="600" y1="280" x2="280" y2="320"/>
    <line x1="600" y1="280" x2="920" y2="320"/>
    <line x1="600" y1="280" x2="450" y2="430"/>
    <line x1="600" y1="280" x2="750" y2="430"/>
    <line x1="380" y1="180" x2="280" y2="320"/>
    <line x1="820" y1="180" x2="920" y2="320"/>
    <line x1="450" y1="430" x2="280" y2="320"/>
    <line x1="750" y1="430" x2="920" y2="320"/>
  </g>
  
  <!-- Outer nodes -->
  <g>
    <circle cx="380" cy="180" r="14" fill="#1A1A1A" stroke="#C13535" stroke-width="2"/>
    <circle cx="380" cy="180" r="5" fill="#C13535"/>
    
    <circle cx="820" cy="180" r="14" fill="#1A1A1A" stroke="#C13535" stroke-width="2"/>
    <circle cx="820" cy="180" r="5" fill="#C13535"/>
    
    <circle cx="280" cy="320" r="14" fill="#1A1A1A" stroke="#C13535" stroke-width="2"/>
    <circle cx="280" cy="320" r="5" fill="#C13535"/>
    
    <circle cx="920" cy="320" r="14" fill="#1A1A1A" stroke="#C13535" stroke-width="2"/>
    <circle cx="920" cy="320" r="5" fill="#C13535"/>
    
    <circle cx="450" cy="430" r="14" fill="#1A1A1A" stroke="#C13535" stroke-width="2"/>
    <circle cx="450" cy="430" r="5" fill="#C13535"/>
    
    <circle cx="750" cy="430" r="14" fill="#1A1A1A" stroke="#C13535" stroke-width="2"/>
    <circle cx="750" cy="430" r="5" fill="#C13535"/>
  </g>
  
  <!-- Central hub -->
  <g transform="translate(600, 280)">
    <circle r="58" fill="none" stroke="#C13535" stroke-width="1" opacity="0.35"/>
    <circle r="40" fill="#1A1A1A" stroke="#C13535" stroke-width="2.5"/>
    <circle r="40" fill="none" stroke="#FFFFFF" stroke-width="1" opacity="0.3"/>
    <!-- IoT center icon: hexagon with center dot -->
    <polygon points="0,-20 17,-10 17,10 0,20 -17,10 -17,-10" 
             fill="none" stroke="#FFFFFF" stroke-width="2"/>
    <circle r="6" fill="#C13535"/>
  </g>
  
  <!-- Topic label -->
  <g transform="translate(60, 540)">
    <rect width="180" height="32" fill="none" stroke="#C13535" stroke-width="1" opacity="0.5"/>
    <text x="90" y="22" font-family="Arial, sans-serif" font-size="11" font-weight="700" 
          letter-spacing="3" fill="#C13535" text-anchor="middle">IOT VERİMLİLİK</text>
  </g>
  
  <text x="1140" y="600" font-family="Arial, sans-serif" font-size="120" font-weight="900" 
        fill="#FFFFFF" opacity="0.04" text-anchor="end">03</text>
</svg>
